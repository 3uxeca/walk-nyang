<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>산책냥 (Walk Nyang)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Jua&display=swap" rel="stylesheet">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #d4e9ff; overflow: hidden; }
      #app { width: 100vw; height: 100vh; }
      canvas { display: block; }

      @keyframes paw-bounce {
        0%, 100% { transform: translateY(0) scale(1); }
        50% { transform: translateY(-14px) scale(1.1); }
      }
      @keyframes fade-in {
        from { opacity: 0; transform: translateY(8px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      #loading {
        position: fixed;
        inset: 0;
        background: #FFF8EE;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: 'Nunito', sans-serif;
        z-index: 9999;
        gap: 14px;
      }
      #loading .paw {
        font-size: 3.5rem;
        animation: paw-bounce 0.9s ease-in-out infinite;
      }
      #loading .label {
        font-size: 1.3rem;
        font-weight: 700;
        color: #FF8C42;
        animation: fade-in 0.6s ease both;
      }
      #loading .sub {
        font-size: 0.85rem;
        font-weight: 600;
        color: #c8a070;
        animation: fade-in 0.6s 0.2s ease both;
      }
    </style>
  </head>
  <body>
    <div id="loading">
      <div class="paw">🐾</div>
      <div class="label">마을로 이동 중...</div>
      <div class="sub">잠시만 기다려 주세요</div>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
